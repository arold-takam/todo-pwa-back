# application-preprod.yml — Docker local
spring:
        datasource:
                url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/todoApp_db}
                username: ${SPRING_DATASOURCE_USERNAME:postgres}
                password: ${SPRING_DATASOURCE_PASSWORD:postgres}
                driver-class-name: org.postgresql.Driver
                hikari:
                        connection-timeout: 20000
                        maximum-pool-size: 5
        
        jpa:
                hibernate:
                        ddl-auto: update
                show-sql: false
                properties:
                        hibernate:
                                dialect: org.hibernate.dialect.PostgreSQLDialect
        
        h2:
                console:
                        enabled: false

management:
        tracing:
                sampling:
                        probability: 1.0
        otlp:
                tracing:
                        endpoint: http://tempo:4318/v1/traces