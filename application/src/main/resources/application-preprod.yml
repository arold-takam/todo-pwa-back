# application-preprod.yml
spring:
        datasource:
                url: jdbc:postgresql://postgres:5432/todoApp_db
                username: postgres
                password: postgres
                driver-class-name: org.postgresql.Driver
        
        jpa:
                hibernate:
                        ddl-auto: update
                show-sql: false
                database-platform: org.hibernate.dialect.PostgreSQLDialect
        
        h2:
                console:
                        enabled: false
                        
management:
        tracing:
                sampling:
                        probability: 1.0
        otlp:
                tracing:
                        endpoint: http://tempo:4318/v1/traces