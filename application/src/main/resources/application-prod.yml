server:
        port: ${PORT:8080}

spring:
        datasource:
                url: ${SPRING_DATASOURCE_URL}
                username: ${SPRING_DATASOURCE_USERNAME}
                password: ${SPRING_DATASOURCE_PASSWORD}
                driver-class-name: org.postgresql.Driver
        jpa:
                hibernate:
                        ddl-auto: update
                show-sql: false
                database-platform: org.hibernate.dialect.PostgreSQLDialect
        h2:
                console:
                        enabled: false

logging:
        level:
                root: INFO
                org.springframework: INFO
                com.app: INFO

springdoc:
        swagger-ui:
                enabled: false

management:
        tracing:
                sampling:
                        probability: 0.1    # 10% en prod pour économiser les ressources
        otlp:
                tracing:
                        endpoint: ${TEMPO_ENDPOINT:http://localhost:4318/v1/traces}