name: CI — Backend (todo-pwa-back)

on:
        push:
                branches: [ master ]
        pull_request:
                branches: [ master ]

jobs:
        test-and-sonar:
                name: Test & Sonar Analysis
                runs-on: ubuntu-latest
                
                services:
                        postgres:
                                image: postgres:16
                                env:
                                        POSTGRES_DB: todoApp_db
                                        POSTGRES_USER: postgres
                                        POSTGRES_PASSWORD: postgres
                                ports:
                                        - 5432:5432
                                options: >-
                                        --health-cmd pg_isready
                                        --health-interval 5s
                                        --health-timeout 5s
                                        --health-retries 10
                
                steps:
                        - name: Checkout code
                          uses: actions/checkout@v4
                          with:
                                  fetch-depth: 0
                        
                        - name: Set up JDK 21
                          uses: actions/setup-java@v4
                          with:
                                  java-version: '21'
                                  distribution: 'temurin'
                                  cache: maven
                        
                        - name: Run tests (skip Modulith structure test)
                          run: |
                                  mvn test -B \
                                    -Dtest='!ModulithStructureTests' \
                                    -Dsurefire.failIfNoSpecifiedTests=false
                          env:
                                  SPRING_PROFILES_ACTIVE: dev
                                  SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/todoApp_db
                                  SPRING_DATASOURCE_USERNAME: postgres
                                  SPRING_DATASOURCE_PASSWORD: postgres
                        
                        - name: SonarQube analysis
                          continue-on-error: true
                          run: |
                                  mvn sonar:sonar \
                                    -Dsonar.projectKey=todo-pwa-back \
                                    -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
                                    -Dsonar.token=${{ secrets.SONAR_TOKEN_BACK }} \
                                    -B
                          env:
                                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
        docker-build-push:
                name: Docker Build & Push
                runs-on: ubuntu-latest
                needs: test-and-sonar
                if: github.ref == 'refs/heads/master'
                
                steps:
                        - name: Checkout code
                          uses: actions/checkout@v4
                        
                        - name: Set up Docker Buildx
                          uses: docker/setup-buildx-action@v3
                        
                        - name: Login to Docker Hub
                          uses: docker/login-action@v3
                          with:
                                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                                  password: ${{ secrets.DOCKERHUB_TOKEN }}
                        
                        - name: Build and push image
                          uses: docker/build-push-action@v5
                          with:
                                  context: .
                                  file: ./Dockerfile
                                  push: true
                                  tags: |
                                          ${{ secrets.DOCKERHUB_USERNAME }}/todo-pwa-back:latest
                                          ${{ secrets.DOCKERHUB_USERNAME }}/todo-pwa-back:${{ github.sha }}
                                  cache-from: type=gha
                                  cache-to: type=gha,mode=max
        
        deploy-render:
                name: Deploy to Render
                runs-on: ubuntu-latest
                needs: docker-build-push
                if: github.ref == 'refs/heads/master'
                
                steps:
                        - name: Trigger Render deploy
                          run: |
                                  curl --fail -X POST \
                                    -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
                                    -H "Content-Type: application/json" \
                                    "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_BACK }}/deploys" \
                                    -d '{}'